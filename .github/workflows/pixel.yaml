name: generate pixel
on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      head: ${{ steps.head.outputs.head }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      # - name: Pixelmaschine
      #   run: |
      #     docker run  --rm \
      #     -v ${{github.workspace}}:/data \
      #     docker.io/tiedemann/pixelmaschine:4ab9b3d \
      #     --target-config /data/target_config.toml --picture-directory /data/pictures --output-directory /data/outputs
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: ./bin/generate.sh
      - name: Commit & Push changes
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # Only commit and push if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: update generated pixels [skip ci]"
            git push
          fi

      - name: Upload to Zipline
        id: images
        env:
          ZIPLINE_TOKEN: ${{ secrets.ZIPLINE_TOKEN }}
          ZIPLINE_HOST: ${{ secrets.ZIPLINE_HOST }}
        run: |
          DEFAULT_URL=$(curl -H "authorization: $ZIPLINE_TOKEN" -F file=@outputs/default_target.png "$ZIPLINE_HOST/api/upload" | jq -r '.files[0]')
          OVERLAY_URL=$(curl -H "authorization: $ZIPLINE_TOKEN" -F file=@outputs/overlay.png "$ZIPLINE_HOST/api/upload" | jq -r '.files[0]')
          echo "default=$DEFAULT_URL" >> "$GITHUB_OUTPUT"
          echo "overlay=$OVERLAY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v3
        if: github.event_name == 'pull_request'
        with:
          message: |
            # Default:
            ![Default](${{ steps.images.outputs.default }})
            # Overlay:
            ![Overlay](${{ steps.images.outputs.overlay }})
      - name: Capture new SHA after push
        id: head
        run: echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # Single deploy job since we're just deploying
  deploy:
    needs: generate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{needs.generate.outputs.head}}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{needs.generate.outputs.head}}
          fetch-depth: 0
      - run: git rev-parse HEAD
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./outputs/"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
